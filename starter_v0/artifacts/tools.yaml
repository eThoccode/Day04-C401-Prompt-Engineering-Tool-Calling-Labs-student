# starter_v0 — tool declarations (professional English schemas).
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Clarify missing parameters or ask the user for confirmation (yes_no) before executing actions."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "The clarification or confirmation question to present to the user."}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "The expected input response type from the user."}
        options: {type: array, default: [], items: {type: string}, description: "Available options if choice response type is used."}
      required: [question]

  - name: timeline
    description: "Fetch the recent posts/tweets of a specific Twitter handle."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "The Twitter username handle (without the @ symbol, e.g., 'sama')."}
        limit: {type: integer, default: 5, description: "Maximum number of recent posts/tweets to retrieve."}
      required: [screenname]

  - name: social_search
    description: "Search Twitter for posts matching a keyword/query. Supports Latest and Top search types."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "The search keyword query string."}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Sorting criteria for the retrieved social media posts."}
        limit: {type: integer, default: 5, description: "Maximum number of posts/tweets to retrieve."}
      required: [query]

  - name: lookup
    description: "Search the web for general information or news within a specific timeframe."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "The search query string (should be clean keywords, omitting filler words)."}
        topic: {type: string, enum: [general, news], default: "general", description: "Search category (general web search or news search)."}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Time window constraint for the search results."}
        max_results: {type: integer, default: 5, description: "Maximum number of search results to return."}
      required: [query]

  - name: fetch
    description: "Read and scrape the full markdown content of a specific absolute URL."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "The absolute, valid URL to fetch content from."}
      required: [url]

  - name: format
    description: "Format collected research data items into structured markdown digest templates."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "List of research item objects containing metadata and content."
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Visual template style for the output digest."}
        headline: {type: string, default: "", description: "Title or main header of the formatted digest."}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Send or publish a text message to a public delivery channel (like Telegram)."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "The text message content to send."}
        confirmed: {type: boolean, default: false, description: "Confirmation flag (must only be set to true if user explicitly confirmed)."}
      required: [text]

  - name: policy
    description: "Search local company policy markdown documentation for compliance or rules."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "The policy search query."}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "The specific policy category area to search in."}
        top_k: {type: integer, default: 3, description: "Number of most relevant policy matches to return."}
      required: [query]

  - name: papers
    description: "Search academic research papers on arXiv by query keywords."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Search query keywords (e.g. Prompt Engineering)."}
        max_results: {type: integer, default: 5, description: "Maximum number of papers to retrieve."}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sorting criteria for arXiv search results."}
      required: [query]

  - name: paper_text
    description: "Extract the local text content from an arXiv academic paper pdf."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "The arXiv ID or absolute PDF URL."}
        max_pages: {type: integer, default: 5, description: "Maximum number of pages to parse."}
        max_chars: {type: integer, default: 8000, description: "Maximum character length of returned text."}
      required: [arxiv_url]

  # ---------------- Custom tools ----------------
  - name: summarizer
    description: "Summarize long texts or article contents into structured bullet points or paragraphs."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "The raw text content to summarize."}
        style: {type: string, enum: [bullets, paragraph], default: "bullets", description: "The style format of the summary."}
        max_sentences: {type: integer, default: 5, description: "Maximum sentence limit for the summary."}
      required: [text, style]

  - name: exporter
    description: "Export research report or markdown text to a physical local file on the disk."
    parameters:
      type: object
      properties:
        content: {type: string, default: "", description: "The report markdown content to save."}
        filename: {type: string, default: "research_report.md", description: "The target file name (e.g., 'my_report.md')."}
      required: [content]
